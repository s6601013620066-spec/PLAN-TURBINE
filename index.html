<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Portal - Turbine Maintenance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600;700&display=swap');
        body { background-color: #0f172a; font-family: 'Chakra Petch', sans-serif; color: #e2e8f0; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border-radius: 2rem; border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-card:hover { transform: translateY(-10px); border-color: rgba(255, 255, 255, 0.3); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-4xl w-full text-center">
        <h1 class="text-4xl md:text-6xl font-bold mb-4 bg-gradient-to-r from-blue-400 via-emerald-400 to-blue-500 bg-clip-text text-transparent">
            TURBINE MAINTENANCE SYSTEM
        </h1>
        <p class="text-slate-400 mb-16 text-lg">กรุณาเลือกเครื่องจักรที่ต้องการจัดการข้อมูล</p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            <a href="gt21_predict.html" class="glass-card p-10 flex flex-col items-center group">
                <div class="w-24 h-24 bg-blue-500/20 rounded-full flex items-center justify-center mb-6 group-hover:bg-blue-500/40 transition-colors">
                    <i class="fas fa-fan text-4xl text-blue-400 animate-spin-slow"></i>
                </div>
                <h2 class="text-3xl font-bold text-white mb-2">GT21</h2>
                <p class="text-slate-400">Palne Turbine GT21</p>
                <div class="mt-8 px-6 py-2 bg-blue-600 rounded-full text-sm font-bold uppercase tracking-widest">Select Unit</div>
            </a>

            <a href="gt22_predict.html" class="glass-card p-10 flex flex-col items-center group">
                <div class="w-24 h-24 bg-emerald-500/20 rounded-full flex items-center justify-center mb-6 group-hover:bg-emerald-500/40 transition-colors">
                    <i class="fas fa-fan text-4xl text-emerald-400 animate-spin-slow"></i>
                </div>
                <h2 class="text-3xl font-bold text-white mb-2">GT22</h2>
                <p class="text-slate-400">Palne Turbine GT22</p>
                <div class="mt-8 px-6 py-2 bg-emerald-600 rounded-full text-sm font-bold uppercase tracking-widest">Select Unit</div>
            </a>
        </div>
    </div>

    <style>
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow { animation: spin-slow 8s linear infinite; }
    </style>
</body>
</html>
