<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GT21 Maintenance Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600;700&display=swap');
        body { background-color: #0f172a; font-family: 'Chakra Petch', sans-serif; color: #e2e8f0; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border-radius: 1.25rem; border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-field { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); color: white; transition: all 0.3s; }
        .swal2-popup { background: #1e293b !important; color: #e2e8f0 !important; border-radius: 1.25rem !important; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-4xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-3xl font-bold bg-gradient-to-r from-emerald-400 to-blue-400 bg-clip-text text-transparent uppercase">GT21 Maintenance Report</h1>
                <p class="text-slate-400">บันทึกผลการซ่อมบำรุงเครื่อง GT21</p>
            </div>
            <div class="flex flex-wrap gap-2">
                <a href="https://docs.google.com/spreadsheets/d/13WHRfiv_sck1McHVGOm_8BzDhU-sqy80JMIerBt4xRo/edit#gid=0" target="_blank" class="bg-blue-600/20 hover:bg-blue-600/40 text-blue-400 py-2 px-4 rounded-xl transition-all border border-blue-500/30 flex items-center">
                    <i class="fas fa-table mr-2"></i> ดู Sheets
                </a>
                <button onclick="window.location.href='gt21_predict.html'" class="bg-slate-800 hover:bg-slate-700 text-slate-300 py-2 px-4 rounded-xl transition-all border border-slate-700 flex items-center">
                    <i class="fas fa-chevron-left mr-2"></i> กลับหน้าจัดการ GT21
                </button>
            </div>
        </header>

        <div class="glass-card p-8 shadow-2xl border-t-4 border-emerald-500">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="md:col-span-2">
                    <label class="block text-xs font-semibold text-emerald-400 uppercase mb-2">วันที่บันทึกรายงาน</label>
                    <input type="date" id="reportDate" class="input-field w-full md:w-1/3 p-3 rounded-xl">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-2">Type</label>
                    <select id="maintType" onchange="autoFetchSetNumber()" class="input-field w-full p-3 rounded-xl">
                        <option value="Type A1">Type A1 (9k)</option>
                        <option value="Type B">Type B (18k)</option>
                        <option value="Type A2">Type A2 (27k)</option>
                        <option value="Type C">Type C (36k)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-2">ครั้งที่ (Set)</label>
                    <input type="number" id="maintSet" class="input-field w-full p-3 rounded-xl text-center">
                </div>
                
                <div>
                    <label class="block text-xs font-semibold text-blue-400 uppercase mb-2">Start (Date & Time)</label>
                    <div class="flex gap-2">
                        <input type="date" id="startDate" class="input-field flex-1 p-3 rounded-xl">
                        <input type="time" id="startTime" class="input-field w-32 p-3 rounded-xl">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-blue-400 uppercase mb-2">Finish (Date & Time)</label>
                    <div class="flex gap-2">
                        <input type="date" id="finishDate" class="input-field flex-1 p-3 rounded-xl">
                        <input type="time" id="finishTime" class="input-field w-32 p-3 rounded-xl">
                    </div>
                </div>

                <div class="md:col-span-2">
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-2">Comment</label>
                    <textarea id="comment" rows="3" class="input-field w-full p-4 rounded-xl resize-none"></textarea>
                </div>
                <div class="md:col-span-2 mt-4">
                    <button onclick="executeSubmit()" id="btnSubmit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-xl transition-all text-lg shadow-lg">
                        <i class="fas fa-save mr-2"></i> บันทึกรายงาน
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ลิงก์ App Script ที่คุณให้มา
        const REPORT_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx8I429AUkVyvSnZkcR6YEsABCmHD2nxPtWyRSouNVZB8qST4RX4_a6LRGPi1eU9-uQ/exec';

        document.getElementById('reportDate').valueAsDate = new Date();

        async function autoFetchSetNumber() {
            const typeFull = document.getElementById('maintType').value;
            const typeKey = typeFull.replace("Type ", "").trim();
            try {
                const res = await fetch(REPORT_SCRIPT_URL);
                const counts = await res.json();
                // แสดงผล Set ล่าสุด + 1
                document.getElementById('maintSet').value = (counts[typeKey] || 0) + 1;
            } catch (e) { 
                console.error('Fetch Counter Error:', e);
            }
        }

        window.onload = autoFetchSetNumber;

        async function executeSubmit() {
            const startDate = document.getElementById('startDate').value;
            const startTime = document.getElementById('startTime').value || '00:00';
            const finishDate = document.getElementById('finishDate').value;
            const finishTime = document.getElementById('finishTime').value || '00:00';

            if (!startDate || !finishDate) {
                Swal.fire('คำเตือน', 'กรุณาระบุวันที่เริ่มและวันที่เสร็จสิ้น', 'warning');
                return;
            }

            const fullStart = `${startDate} ${startTime}`;
            const fullFinish = `${finishDate} ${finishTime}`;

            const startObj = new Date(fullStart);
            const finishObj = new Date(fullFinish);
            const diffMs = finishObj - startObj;
            const diffDays = diffMs / (1000 * 60 * 60 * 24);

            if (diffDays < 0) {
                Swal.fire('ข้อผิดพลาด', 'วันที่เสร็จสิ้นต้องไม่มาก่อนวันที่เริ่ม', 'error');
                return;
            }

            const btn = document.getElementById('btnSubmit');
            const data = {
                reportDate: document.getElementById('reportDate').value,
                type: document.getElementById('maintType').value,
                set: document.getElementById('maintSet').value,
                start: fullStart,
                finish: fullFinish,
                duration: parseFloat(diffDays.toFixed(2)),
                comment: document.getElementById('comment').value
            };
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> กำลังบันทึก...';

            try {
                await fetch(REPORT_SCRIPT_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data) 
                });

                Swal.fire({ 
                    icon: 'success', 
                    title: 'สำเร็จ!', 
                    text: 'บันทึกรายงานการซ่อมบำรุงเรียบร้อยแล้ว',
                    timer: 2000,
                    showConfirmButton: false
                }).then(() => {
                    // กลับไปหน้า Predict เพื่อดูการอัปเดต
                    window.location.href = 'gt21_predict.html';
                });
            } catch (e) { 
                console.error('Submit Error:', e);
                Swal.fire('Error', 'ไม่สามารถเชื่อมต่อกับระบบได้ กรุณาลองใหม่อีกครั้ง', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save mr-2"></i> บันทึกรายงาน';
            }
        }
    </script>
</body>
</html>
